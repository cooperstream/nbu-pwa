<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

  <title>НБУ Дашборд Валют</title>
  <meta name="theme-color" content="#0b1220">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Курси НБУ">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png" sizes="192x192" type="image/png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0b1220; --panel: #111827; --panel-2: #0f172a;
      --text: #e5e7eb; --muted: #94a3b8; --border: #243041;
      --primary: #22c55e; --primary-soft: rgba(34,197,94,0.16);
      --danger: #f87171; --shadow: 0 10px 30px rgba(0,0,0,0.28); --radius: 16px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      background: radial-gradient(circle at top, rgba(34,197,94,0.08), transparent 30%),
                  linear-gradient(180deg,#09111d 0%,#0b1220 100%);
      color:var(--text);
      font-family:Inter,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      min-height:100%;
      scrollbar-width:thin; scrollbar-color:#2b3a55 #0b1220;
    }
    body{padding:16px;padding-bottom:max(16px, env(safe-area-inset-bottom));display:flex;justify-content:center}
    .dashboard{width:100%;max-width:760px}

    .header{
      background:linear-gradient(180deg,rgba(31,41,55,.96),rgba(17,24,39,.96));
      border:1px solid var(--border); border-radius:20px;
      padding:18px 18px 14px; box-shadow:var(--shadow); margin-bottom:clamp(20px, 2.7vh, 30px);
    }
    .header-top{display:flex;align-items:center;gap:12px}
    .logo{
      width:44px;height:44px;border-radius:12px;flex:0 0 auto;
      background:linear-gradient(135deg,rgba(34,197,94,.2),rgba(34,197,94,.06));
      border:1px solid rgba(34,197,94,.22);
      display:flex;align-items:center;justify-content:center;font-size:22px;
    }
    .header-titles{flex:1 1 auto;min-width:0}
    h1{font-size:22px;line-height:1.2;letter-spacing:.2px}
    .subtitle{margin-top:2px;color:var(--muted);font-size:13px}
    .header-actions{display:flex;align-items:center;gap:8px;flex:0 0 auto}
    .icon-btn{
      width:36px;height:36px;border-radius:10px;
      border:1px solid var(--border);background:rgba(255,255,255,.04);
      color:var(--muted);display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:background .2s,color .2s,border-color .2s;padding:0;
    }
    .icon-btn:hover{background:rgba(34,197,94,.1);color:var(--primary);border-color:rgba(34,197,94,.3)}
    .icon-btn:focus-visible{outline:2px solid rgba(34,197,94,.6);outline-offset:2px}
    .icon-btn:disabled{opacity:.5;cursor:not-allowed}
    @keyframes spin{to{transform:rotate(360deg)}}
    .icon-btn.spinning svg{animation:spin .75s linear infinite}
    .last-updated{margin-top:10px;margin-left:56px;color:var(--muted);font-size:12px}

    .grid{display:grid;gap:clamp(14px, 1.8vh, 18px)}

    .item-wrapper{
      background:linear-gradient(180deg,rgba(17,24,39,.96),rgba(15,23,42,.96));
      border:1px solid var(--border); border-radius:var(--radius);
      overflow:hidden; box-shadow:var(--shadow); transition:border-color .2s;
    }
    .item-wrapper:hover{border-color:rgba(34,197,94,.35)}
    .item-wrapper.active{border-color:rgba(34,197,94,.45)}
    .card{
      width:100%;background:transparent;color:inherit;border:none;
      padding:clamp(14px, 1.8vh, 18px) 16px;display:flex;align-items:center;
      justify-content:space-between;gap:10px;cursor:pointer;text-align:left;
    }
    .card:focus-visible{outline:2px solid rgba(34,197,94,.6);outline-offset:-2px}
    .currency-info{display:flex;align-items:center;gap:12px;flex:1 1 auto;min-width:0}
    .currency-badge{
      width:46px;height:46px;border-radius:13px;flex:0 0 auto;
      background:linear-gradient(135deg,rgba(34,197,94,.18),rgba(255,255,255,.04));
      border:1px solid rgba(34,197,94,.22);
      display:flex;align-items:center;justify-content:center;
      font-weight:800;font-size:20px;line-height:1;
    }
    .currency-text{min-width:0}
    .currency-code{font-weight:800;font-size:17px;line-height:1.1}
    .currency-name{margin-top:3px;font-size:13px;color:var(--muted);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:none;
      line-height:1.15}
    .right-side{display:flex;align-items:center;gap:10px;flex:0 0 auto}
    .sparkline-col{display:flex;align-items:center;opacity:0;transition:opacity .5s;flex:0 0 auto}
    .sparkline-col.ready{opacity:1}
    .rate-box{
      text-align:right;
      min-width:calc(62px + 8px + 11ch);
    }
    .rate-row{
      display:grid;
      grid-template-columns:62px minmax(11ch, auto);
      align-items:center;
      justify-content:end;
      column-gap:8px;
    }
    .rate-value{
      color:#dbe4ea;
      font-size:19px;
      font-weight:800;
      line-height:1.1;
      white-space:nowrap;
      min-width:11ch;
      text-align:right;
      font-variant-numeric:tabular-nums;
      font-feature-settings:"tnum" 1;
    }
    .delta{
      width:62px;
      font-size:11px;
      font-weight:600;
      padding:2px 5px;
      border-radius:6px;
      line-height:1.4;
      white-space:nowrap;
      text-align:center;
      justify-self:end;
      font-variant-numeric:tabular-nums;
      font-feature-settings:"tnum" 1;
    }
    .delta.up  {color:#4ade80;background:rgba(34,197,94,.15)}
    .delta.down{color:#f87171;background:rgba(248,113,113,.15)}
    .delta.flat{color:var(--muted);background:rgba(148,163,184,.1)}
    .delta.loading{color:transparent;background:rgba(148,163,184,.08);
      min-width:0;animation:pulse 1.4s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
    .rate-note{margin-top:3px;font-size:12px;color:var(--muted);text-align:right}
    .chevron{
      width:18px;height:18px;color:var(--muted);flex:0 0 auto;
      transition:transform .25s,color .25s;
    }
    .item-wrapper.active .chevron{transform:rotate(180deg);color:#86efac}

    .details{max-height:0;overflow:hidden;transition:max-height .38s ease,opacity .25s;opacity:0}
    .item-wrapper.active .details{max-height:600px;opacity:1;border-top:1px solid var(--border)}
    .details-inner{padding:14px 16px 16px}
    .period-tabs{display:flex;gap:6px;margin-bottom:14px}
    .period-tab{
      padding:5px 13px;border-radius:8px;border:1px solid var(--border);
      background:transparent;color:var(--muted);font-size:12px;font-weight:600;
      cursor:pointer;transition:background .15s,color .15s,border-color .15s;font-family:inherit;
    }
    .period-tab:hover{color:var(--text);border-color:rgba(148,163,184,.4)}
    .period-tab.active{background:var(--primary-soft);color:#86efac;border-color:rgba(34,197,94,.35)}

    .loader-text,.chart-error,.chart-empty{
      color:var(--muted);font-size:13px;text-align:center;padding:24px 10px;
    }
    .chart-error{color:var(--danger)}
    .chart-wrap{position:relative;height:230px;display:none}
    .chart-wrap.ready{display:block}

    .loading-screen,.global-error{
      padding:28px 16px;text-align:center;
      background:linear-gradient(180deg,rgba(17,24,39,.96),rgba(15,23,42,.96));
      border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);
    }
    .global-error{color:var(--danger)}

    ::-webkit-scrollbar{width:10px}
    ::-webkit-scrollbar-track{background:#0b1220}
    ::-webkit-scrollbar-thumb{background:#2b3a55;border-radius:999px;border:2px solid #0b1220}
    ::-webkit-scrollbar-thumb:hover{background:#3b4d70}

    @media(max-width:560px){
      .header{padding:18px 18px 14px;margin-bottom:16px}
      .card{padding:14px 14px;gap:8px}
      .currency-info{gap:10px}
      .currency-badge{width:44px;height:44px;border-radius:11px;font-size:18px}
      .currency-code{font-size:16px}
      .rate-value{font-size:16px;min-width:9.2ch}
      .currency-name{font-size:12px}
      .right-side{gap:8px}
      .sparkline-col{display:none}
      .rate-box{min-width:calc(52px + 4px + 9.2ch)}
      .rate-row{grid-template-columns:52px minmax(9.2ch, auto);column-gap:4px}
      .delta{width:52px;font-size:10.5px;padding:2px 4px}
      .rate-note{font-size:11.5px}
      .grid{gap:10px}
      .chart-wrap{height:180px}
      .item-wrapper.active .details{max-height:480px}
    }

    @media (max-height: 560px) and (orientation: landscape){
      .chart-wrap{height:140px}
      .item-wrapper.active .details{max-height:560px}
    }
  </style>
</head>
<body>
<div class="dashboard">
  <header class="header">
    <div class="header-top">
      <div class="logo" aria-hidden="true">₴</div>
      <div class="header-titles">
        <h1>Курси НБУ</h1>
        <p class="subtitle">Поточний курс та динаміка</p>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="install-btn" title="Встановити додаток"
                aria-label="Встановити додаток" style="display:none">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
        <button class="icon-btn" id="refresh-btn" title="Оновити курси" aria-label="Оновити курси">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M23 4v6h-6"/>
            <path d="M1 20v-6h6"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>

    </div>

  <div class="grid" id="rates-grid">
    <div class="loading-screen">Завантаження даних НБУ…</div>
  </div>
</div>

<script>
"use strict";

const CURRENCY_META = {
  USD:{name:"Долар США",         symbol:"$" },
  EUR:{name:"Євро",              symbol:"€" },
  PLN:{name:"Польський злотий",  symbol:"zł"},
  GBP:{name:"Фунт стерлінгів",   symbol:"£" },
  CHF:{name:"Швейцарський франк",symbol:"Fr"},
  CAD:{name:"Канадський долар",  symbol:"C$"},
  JPY:{name:"Японська єна",      symbol:"¥" },
  CNY:{name:"Китайський юань",   symbol:"元"},
};
const CODES = Object.keys(CURRENCY_META);
const PERIODS = {
  "30d":{label:"30 дн",days:30},
  "90d":{label:"90 дн",days:90},
  "1y" :{label:"1 рік",days:365},
};
const TTL = {
  today: 30*60*1000,
  past:  24*60*60*1000,
  h30:   20*60*1000,
  h90:   60*60*1000,
  h1y:   12*60*60*1000,
  hEmpty:2*60*1000,
};
const HIST_CACHE_VERSION = 3;

const chartInstances={}, activePeriod={}, memCache={}, chartRequestTokens={};

const grid       = document.getElementById("rates-grid");
const lastUpd    = document.getElementById("last-updated");
const refreshBtn = document.getElementById("refresh-btn");
const installBtn = document.getElementById("install-btn");

function cSet(k,v){
  memCache[k]={v,t:Date.now()};
  try{localStorage.setItem("nbu5_"+k,JSON.stringify({v,t:Date.now()}))}catch(e){}
}
function cGet(k,ttl){
  const m=memCache[k];if(m&&Date.now()-m.t<=ttl)return m.v;
  try{
    const raw=localStorage.getItem("nbu5_"+k);if(!raw)return null;
    const{v,t}=JSON.parse(raw);if(Date.now()-t>ttl)return null;
    memCache[k]={v,t};return v;
  }catch(e){return null}
}

function fmtYMD(d){return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`}
function fmtDMY(d){return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}`}
function pad(n){return String(n).padStart(2,"0")}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function daysInMonth(year,monthIndex){return new Date(year,monthIndex+1,0).getDate()}
function sameCalendarDay(a,b){
  return a.getFullYear()===b.getFullYear()
    && a.getMonth()===b.getMonth()
    && a.getDate()===b.getDate();
}
function getAdaptive30dStepDays(){
  return 3;
}
function buildHistorySampleDates(periodKey,end){
  const endDate=new Date(end.getFullYear(),end.getMonth(),end.getDate());

  if(periodKey==="30d"){
    const start=addDays(endDate,-30);
    const step=getAdaptive30dStepDays();
    const dates=[];
    for(let d=new Date(start);d<=endDate;d=addDays(d,step))dates.push(new Date(d));
    if(!dates.length||!sameCalendarDay(dates[dates.length-1],endDate))dates.push(new Date(endDate));
    return dates;
  }

  if(periodKey==="90d"){
    const start=addDays(endDate,-90);
    const dates=[];
    for(let d=new Date(start);d<=endDate;d=addDays(d,7))dates.push(new Date(d));
    if(!dates.length||!sameCalendarDay(dates[dates.length-1],endDate))dates.push(new Date(endDate));
    return dates;
  }

  const dates=[];
  const anchorDay=endDate.getDate();
  for(let i=11;i>=0;i--){
    const base=new Date(endDate.getFullYear(),endDate.getMonth()-i,1);
    const y=base.getFullYear();
    const m=base.getMonth();
    const d=Math.min(anchorDay,daysInMonth(y,m));
    dates.push(new Date(y,m,d));
  }
  return dates;
}

async function nbuFetch(url){
  const r=await fetch(url,{signal:AbortSignal.timeout(6000)});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function fetchHistoryPoint(url,timeoutMs=6000){
  try{
    const r=await fetch(url,{signal:AbortSignal.timeout(timeoutMs)});
    if(!r.ok)return{ok:false,kind:"http",status:r.status};
    const raw=await r.json();
    if(!Array.isArray(raw)||!raw.length||!raw[0]?.rate)return{ok:false,kind:"empty"};
    return{ok:true,rate:Number(raw[0].rate)};
  }catch(err){
    const name=err?.name||"";
    if(name==="TimeoutError"||name==="AbortError")return{ok:false,kind:"timeout"};
    return{ok:false,kind:"http"};
  }
}

async function getCurrentRates(forceRefresh=false){
  const today=fmtYMD(new Date());
  if(!forceRefresh){
    const c=cGet("rates_"+today,TTL.today);
    if(c)return c;
  }
  const d=await nbuFetch(
    `https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?date=${today}&json`
  );
  if(!d||!d.length)throw new Error("НБУ не повернуло поточні курси");
  cSet("rates_"+today,d);
  return d;
}

async function getYesterdayRates(){
  const yest=fmtYMD(addDays(new Date(),-1));
  const c=cGet("rates_"+yest,TTL.past);if(c)return c;
  try{
    const d=await nbuFetch(
      `https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?date=${yest}&json`
    );
    if(d&&d.length){cSet("rates_"+yest,d);return d}
  }catch(e){}
  return [];
}

async function getHistory(cc,periodKey){
  const ttlH=periodKey==="30d"?TTL.h30:periodKey==="90d"?TTL.h90:TTL.h1y;
  const cKey=`hist_v${HIST_CACHE_VERSION}_${cc}_${periodKey}`;
  const emptyKey=`hist_empty_v${HIST_CACHE_VERSION}_${cc}_${periodKey}`;
  if(cGet(emptyKey,TTL.hEmpty))return [];

  const cached=cGet(cKey,ttlH);
  if(Array.isArray(cached)&&cached.length>0){
    return cached.map(i=>({date:new Date(i.d),rate:i.r}));
  }

  const legacyCached=cGet(`hist_${cc}_${periodKey}`,ttlH);
  if(Array.isArray(legacyCached)&&legacyCached.length>0){
    return legacyCached.map(i=>({date:new Date(i.d),rate:i.r}));
  }

  const dates=buildHistorySampleDates(periodKey,new Date());
  const minPointsByPeriod={"30d":5,"90d":6,"1y":6};
  const minPoints=minPointsByPeriod[periodKey]||4;
  const maxParallel=5;
  const result=new Array(dates.length).fill(null);
  const stats={timeout:0,http:0,empty:0,failed:0,retried:0};

  async function runBatch(indexes,batchMaxParallel,timeoutMs,countAsRetried=false){
    let cursor=0;
    async function worker(){
      while(cursor<indexes.length){
        const pos=cursor++;
        const idx=indexes[pos];
        const d=dates[idx];
        const url=`https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?valcode=${cc}&date=${fmtYMD(d)}&json`;
        const res=await fetchHistoryPoint(url,timeoutMs);
        if(res.ok){
          result[idx]={date:d,rate:res.rate};
          continue;
        }
        stats.failed++;
        if(res.kind==="timeout")stats.timeout++;
        else if(res.kind==="empty")stats.empty++;
        else stats.http++;
        if(countAsRetried)stats.retried++;
      }
    }
    const workers=Array.from({length:Math.min(batchMaxParallel,indexes.length)},()=>worker());
    await Promise.all(workers);
  }

  const allIndexes=dates.map((_,idx)=>idx);
  await runBatch(allIndexes,maxParallel,6000,false);

  let normalized=result.filter(Boolean).sort((a,b)=>a.date-b.date);
  if(normalized.length<minPoints){
    const missingIndexes=result
      .map((v,idx)=>v?null:idx)
      .filter(idx=>idx!==null);
    if(missingIndexes.length){
      await runBatch(missingIndexes,2,9000,true);
      normalized=result.filter(Boolean).sort((a,b)=>a.date-b.date);
    }
  }

  const failRatio=dates.length?stats.failed/dates.length:0;
  const hasTransportIssues=(stats.timeout+stats.http)>0;
  if(!normalized.length&&hasTransportIssues&&failRatio>=0.3){
    const err=new Error("Сервер НБУ не відповідає стабільно, спробуйте пізніше.");
    err.code="HISTORY_FETCH_FAILED";
    throw err;
  }

  if(normalized.length===0){
    cSet(emptyKey,true);
    return normalized;
  }

  cSet(cKey,normalized.map(i=>({d:i.date.getTime(),r:i.rate})));
  return normalized;
}

function buildSparkline(values,W=68,H=30){
  if(!values||values.length<2)return"";
  const min=Math.min(...values),max=Math.max(...values),rng=max-min||1;
  const px=i=>((i/(values.length-1))*W).toFixed(1);
  const py=v=>(H-2-((v-min)/rng)*(H-4)).toFixed(1);
  const pts=values.map((v,i)=>`${px(i)},${py(v)}`).join(" ");
  const area=`M 0,${H} `+values.map((v,i)=>`L ${px(i)},${py(v)}`).join(" ")+` L ${W},${H} Z`;
  const col=values[values.length-1]>=values[0]?"#22c55e":"#f87171";
  const gid="sg"+Math.random().toString(36).slice(2,8);
  return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" fill="none" aria-hidden="true">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity=".28"/>
      <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#${gid})"/>
    <polyline points="${pts}" stroke="${col}" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function buildDelta(today,prev){
  if(prev==null)return`<span class="delta loading" aria-hidden="true">&nbsp;</span>`;
  const diff=today-prev,pct=(diff/prev)*100;
  if(Math.abs(pct)<0.005)return`<span class="delta flat">±0%</span>`;
  const cls=pct>0?"up":"down",arrow=pct>0?"↑":"↓";
  return`<span class="delta ${cls}" title="${pct>0?"+":"−"}${Math.abs(diff).toFixed(2)} ₴">`
    +`${arrow}${Math.abs(pct).toFixed(2)}%</span>`;
}

function fmtRate(v){return Number(v).toLocaleString("uk-UA",{minimumFractionDigits:2,maximumFractionDigits:4})}
function escHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function setMsg(cc,type,visible,text){
  const el=document.getElementById(`${type}-${cc}`);
  if(!el)return;el.style.display=visible?"block":"none";
  if(visible&&text!=null)el.textContent=text;
}

function ensureCardFullyVisible(cc, smooth = true){
  const wrap = document.getElementById(`wrap-${cc}`);
  if(!wrap) return;

  const rect = wrap.getBoundingClientRect();
  const topPad = 10;
  const bottomPad = 12;

  if(rect.bottom > window.innerHeight - bottomPad){
    window.scrollBy({
      top: rect.bottom - window.innerHeight + bottomPad,
      behavior: smooth ? "smooth" : "auto"
    });
  } else if(rect.top < topPad){
    window.scrollBy({
      top: rect.top - topPad,
      behavior: smooth ? "smooth" : "auto"
    });
  }
}

function scheduleEnsureCardVisible(cc, delay = 0){
  window.setTimeout(() => ensureCardFullyVisible(cc), delay);
}

function renderCards(rates,prevMap){
  grid.innerHTML="";
  rates.forEach(item=>{
    const meta=CURRENCY_META[item.cc]||{};
    const units=item.units||1;
    const w=document.createElement("section");
    w.className="item-wrapper";w.id=`wrap-${item.cc}`;
    w.innerHTML=`
      <button class="card" type="button" aria-expanded="false" aria-controls="det-${item.cc}">
        <div class="currency-info">
          <div class="currency-badge" aria-hidden="true">${meta.symbol||item.cc}</div>
          <div class="currency-text">
            <div class="currency-code">${item.cc}</div>
            <div class="currency-name">${meta.name||escHtml(item.txt)}</div>
          </div>
        </div>
        <div class="right-side">
          <div class="sparkline-col" id="spark-${item.cc}"></div>
          <div class="rate-box">
            <div class="rate-row">
              ${buildDelta(item.rate,prevMap[item.cc])}
              <span class="rate-value">${fmtRate(item.rate)}&thinsp;₴</span>
            </div>
            <div class="rate-note">за ${units}&thinsp;${item.cc}</div>
          </div>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.2"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </button>
      <div class="details" id="det-${item.cc}" role="region" aria-label="Деталі ${item.cc}">
        <div class="details-inner">
          <div class="period-tabs" role="group" aria-label="Обрати період">
            ${Object.entries(PERIODS).map(([k,p])=>
              `<button class="period-tab${k==="30d"?" active":""}"
                       data-cc="${item.cc}" data-period="${k}">${p.label}</button>`
            ).join("")}
          </div>
          <div class="loader-text" id="loader-${item.cc}" style="display:none">Завантаження…</div>
          <div class="chart-error"  id="err-${item.cc}"   style="display:none"></div>
          <div class="chart-empty"  id="empty-${item.cc}" style="display:none">Немає даних.</div>
          <div class="chart-wrap"   id="cwrap-${item.cc}">
            <canvas id="chart-${item.cc}"></canvas>
          </div>
        </div>
      </div>`;
    w.querySelector(".card").addEventListener("click",()=>toggleCard(item.cc));
    w.querySelectorAll(".period-tab").forEach(btn=>
      btn.addEventListener("click",e=>{e.stopPropagation();switchPeriod(item.cc,btn.dataset.period)})
    );
    grid.appendChild(w);
  });
}

async function toggleCard(cc){
  const w=document.getElementById(`wrap-${cc}`);
  const btn=w.querySelector(".card");
  const wasOpen=w.classList.contains("active");

  document.querySelectorAll(".item-wrapper.active").forEach(el=>{
    if(el===w)return;
    el.classList.remove("active");
    el.querySelector(".card")?.setAttribute("aria-expanded","false");
  });

  if(wasOpen){
    w.classList.remove("active");
    btn.setAttribute("aria-expanded","false");
    return;
  }

  w.classList.add("active");
  btn.setAttribute("aria-expanded","true");

  scheduleEnsureCardVisible(cc, 60);

  if(!chartInstances[cc]){
    await loadChart(cc,activePeriod[cc]||"30d");
    scheduleEnsureCardVisible(cc, 220);
  } else {
    chartInstances[cc].resize();
    scheduleEnsureCardVisible(cc, 120);
  }
}

async function switchPeriod(cc,pKey){
  if(activePeriod[cc]===pKey&&chartInstances[cc])return;
  activePeriod[cc]=pKey;

  document.getElementById(`wrap-${cc}`)?.querySelectorAll(".period-tab")
    .forEach(b=>b.classList.toggle("active",b.dataset.period===pKey));

  if(chartInstances[cc]){
    chartInstances[cc].destroy();
    delete chartInstances[cc];
  }

  document.getElementById(`cwrap-${cc}`)?.classList.remove("ready");
  await loadChart(cc,pKey);
  scheduleEnsureCardVisible(cc, 220);
}

async function loadChart(cc,pKey){
  activePeriod[cc]=pKey;
  const requestToken = `${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
  chartRequestTokens[cc] = requestToken;

  setMsg(cc,"loader",true);setMsg(cc,"err",false);setMsg(cc,"empty",false);
  try{
    const history=await getHistory(cc,pKey);

    if(chartRequestTokens[cc] !== requestToken) return;
    if(activePeriod[cc] !== pKey) return;
    if(!document.getElementById(`wrap-${cc}`)?.classList.contains("active")) return;

    setMsg(cc,"loader",false);
    if(!history.length){setMsg(cc,"empty",true,"Немає даних за цей період.");return}
    renderChart(cc,history,pKey);
  }catch(err){
    if(chartRequestTokens[cc] !== requestToken) return;
    setMsg(cc,"loader",false);
    setMsg(cc,"err",true,`Помилка: ${escHtml(err.message)}`);
  }
}

function renderChart(cc,history,pKey){
  const cwrap=document.getElementById(`cwrap-${cc}`);
  const canvas=document.getElementById(`chart-${cc}`);
  if(!cwrap||!canvas)return;

  if(chartInstances[cc]){
    try{chartInstances[cc].destroy()}catch(e){}
    delete chartInstances[cc];
  }

  const existingChart = typeof Chart.getChart === "function" ? Chart.getChart(canvas) : null;
  if(existingChart){
    try{existingChart.destroy()}catch(e){}
  }

  const data=history;
  const locOpts=pKey==="1y"
    ? {month:"short",year:"2-digit"}
    : {day:"numeric",month:"short"};
  const labels=data.map(p=>p.date.toLocaleDateString("uk-UA",locOpts));
  const values=data.map(p=>p.rate);
  cwrap.classList.add("ready");

  const is30d=pKey==="30d";
  const is90d=pKey==="90d";
  const is1y=pKey==="1y";

  chartInstances[cc]=new Chart(canvas.getContext("2d"),{
    type:"line",
    data:{labels,datasets:[{
      label:"Курс",
      data:values,
      borderColor:"#22c55e",
      backgroundColor:"rgba(34,197,94,.11)",
      fill:true,
      borderWidth:is30d?2.1:2.3,
      cubicInterpolationMode:is30d?"default":"monotone",
      tension:is30d?0.42:0,
      spanGaps:true,
      pointRadius:2,
      pointHoverRadius:4,
      pointHitRadius:14,
      pointBackgroundColor:"#86efac",
      pointBorderColor:"#22c55e",
      pointBorderWidth:1,
    }]},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{mode:"index",intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:"rgba(15,23,42,.96)",
          titleColor:"#e5e7eb",
          bodyColor:"#e5e7eb",
          borderColor:"rgba(148,163,184,.22)",
          borderWidth:1,
          callbacks:{label:ctx=>` ${fmtRate(ctx.parsed.y)} ₴`}
        }
      },
      scales:{
        x:{
          grid:{display:false},
          ticks:{
            color:"#94a3b8",
            maxRotation:0,
            autoSkip:true,
            maxTicksLimit:is1y?6:(is90d?7:8)
          },
          border:{color:"#243041"}
        },
        y:{
          ticks:{color:"#94a3b8",callback:v=>`${fmtRate(v)} ₴`},
          grid:{color:"rgba(148,163,184,.07)"},
          border:{color:"#243041"}
        }
      }
    }
  });

  requestAnimationFrame(() => {
    chartInstances[cc]?.resize();
    scheduleEnsureCardVisible(cc, 80);
  });
}

function prefetchSparklines(){
  if(window.matchMedia("(max-width: 560px)").matches)return;
  const maxCards=3;
  const orderedVisibleCodes=[...CODES].filter(cc=>{
    const el=document.getElementById(`spark-${cc}`);
    if(!el)return false;
    const rect=el.getBoundingClientRect();
    const viewportPad=120;
    return rect.bottom>=-viewportPad&&rect.top<=window.innerHeight+viewportPad;
  }).slice(0,maxCards);
  const codes=orderedVisibleCodes.length?orderedVisibleCodes:[...CODES].slice(0,2);
  let failures=0;
  const maxFailures=3;

  const maybePrefetchVisible=async cc=>{
    if(failures>=maxFailures)return;
    const el=document.getElementById(`spark-${cc}`);
    if(!el)return;
    const rect=el.getBoundingClientRect();
    const viewportPad=120;
    const isVisible=rect.bottom>=-viewportPad&&rect.top<=window.innerHeight+viewportPad;
    if(!isVisible)return;
    try{
      const h=await getHistory(cc,"30d");
      if(h.length<2)return;
      el.innerHTML=buildSparkline(h.map(p=>p.rate));
      el.classList.add("ready");
    }catch(e){
      failures++;
    }
  };

  const runPrefetch=()=>codes.reduce((p,cc)=>p.then(()=>maybePrefetchVisible(cc)),Promise.resolve());
  const startAfterInteraction=()=>{
    window.removeEventListener("pointerdown",startAfterInteraction);
    window.removeEventListener("keydown",startAfterInteraction);
    window.removeEventListener("touchstart",startAfterInteraction);
    if("requestIdleCallback" in window){
      window.requestIdleCallback(()=>{runPrefetch().catch(()=>{});},{timeout:1400});
    }else{
      window.setTimeout(()=>{runPrefetch().catch(()=>{});},350);
    }
  };
  window.addEventListener("pointerdown",startAfterInteraction,{once:true,passive:true});
  window.addEventListener("keydown",startAfterInteraction,{once:true});
  window.addEventListener("touchstart",startAfterInteraction,{once:true,passive:true});
}

async function loadDashboard(forceRefresh=false){
  refreshBtn.classList.add("spinning");refreshBtn.disabled=true;
  try{
    const[curRes,yestRes]=await Promise.allSettled([
      getCurrentRates(forceRefresh),
      getYesterdayRates()
    ]);
    let current=(curRes.status==="fulfilled"?curRes.value:[])
      .filter(i=>CODES.includes(i.cc));
    if(!current.length)throw new Error("Дані НБУ недоступні");
    current.sort((a,b)=>CODES.indexOf(a.cc)-CODES.indexOf(b.cc));

    const prevMap={};
    if(yestRes.status==="fulfilled")
      yestRes.value.forEach(i=>{prevMap[i.cc]=i.rate});

    Object.values(chartInstances).forEach(c=>{try{c.destroy()}catch(e){}});
    Object.keys(chartInstances).forEach(k=>delete chartInstances[k]);
    Object.keys(activePeriod).forEach(k=>delete activePeriod[k]);

    renderCards(current,prevMap);

    const t=new Date().toLocaleTimeString("uk-UA",{hour:"2-digit",minute:"2-digit"});
    lastUpd.textContent=`Дані на: ${current[0]?.exchangedate||"—"} · оновлено о ${t}`;
    localStorage.setItem("nbu5_last_fetch",Date.now().toString());
    prefetchSparklines();
  }catch(err){
    grid.innerHTML=`<div class="global-error">
      Не вдалося завантажити курси НБУ.<br>
      <small>${escHtml(err.message)}</small>
    </div>`;
    lastUpd.textContent="Дані недоступні";
  }finally{
    refreshBtn.classList.remove("spinning");refreshBtn.disabled=false;
  }
}

refreshBtn.addEventListener("click",()=>loadDashboard(true));
document.addEventListener("visibilitychange",()=>{
  if(document.hidden)return;
  const last=parseInt(localStorage.getItem("nbu5_last_fetch")||"0");
  if(Date.now()-last>30*60*1000)loadDashboard(false);
});

let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();deferredPrompt=e;installBtn.style.display="flex";
});
installBtn.addEventListener("click",async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  const{outcome}=await deferredPrompt.userChoice;
  if(outcome==="accepted")installBtn.style.display="none";
  deferredPrompt=null;
});
window.addEventListener("appinstalled",()=>{deferredPrompt=null;installBtn.style.display="none"});
if("serviceWorker" in navigator)
  window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));

window.addEventListener("resize", () => {
  const active = document.querySelector(".item-wrapper.active");
  if(!active) return;
  const cc = active.id.replace("wrap-", "");
  scheduleEnsureCardVisible(cc, 80);
});

window.addEventListener("orientationchange", () => {
  const active = document.querySelector(".item-wrapper.active");
  if(!active) return;
  const cc = active.id.replace("wrap-", "");
  scheduleEnsureCardVisible(cc, 250);
});

loadDashboard();
</script>
